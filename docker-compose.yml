version: "3.9"

services:
    mysql:
        image: mysql:8.0
        container_name: payroll-mysql
        restart: unless-stopped
        environment:
            MYSQL_ROOT_PASSWORD: rootpassword
            MYSQL_DATABASE: payrollBillingDB
            MYSQL_USER: payroll_user
            MYSQL_PASSWORD: payroll_pass
        ports:
            - "3307:3306" # host:container
        volumes:
            - payroll_db:/var/lib/mysql
volumes:
    payroll_db: