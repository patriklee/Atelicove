# spring.application.name=BillingSystem

# MySQL Database Configuration (Docker)
spring.datasource.url=jdbc:mysql://localhost:3307/payrollBillingDB?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=payroll_user
spring.datasource.password=payroll_pass
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Hibernate Configuration
# (Optional) You can remove this line entirely; Spring Boot will auto-detect the dialect
# spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# For first run, use update so tables can be created if needed
spring.jpa.hibernate.ddl-auto=update
